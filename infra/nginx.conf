# nginx.conf — reverse proxy for CT Town Advisor on Cloud Run
# Port 8080 (external) → Streamlit :8501 and FastAPI :8081
#
# All temp/log paths use /tmp to stay writable in Cloud Run containers.

worker_processes 1;
error_log  /dev/stderr warn;
pid        /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    # Writable temp directories (Cloud Run has a read-only root fs)
    client_body_temp_path /tmp/nginx-client-body;
    proxy_temp_path       /tmp/nginx-proxy;
    fastcgi_temp_path     /tmp/nginx-fastcgi;
    uwsgi_temp_path       /tmp/nginx-uwsgi;
    scgi_temp_path        /tmp/nginx-scgi;

    access_log /dev/stdout;

    # WebSocket keep-alive
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 8080;

        # ── FastAPI WebSocket (Gemini Live audio proxy) ──────────────────
        location /ws/ {
            proxy_pass         http://127.0.0.1:8081;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection $connection_upgrade;
            proxy_set_header   Host       $host;
            proxy_read_timeout  3600s;
            proxy_send_timeout  3600s;
        }

        # ── Streamlit app (everything else) ─────────────────────────────
        location / {
            proxy_pass         http://127.0.0.1:8501;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection $connection_upgrade;
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_read_timeout  3600s;
            proxy_send_timeout  3600s;
        }
    }
}
