version: "3.9"

services:
  ct-town-advisor:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    image: ct-town-advisor:latest
    container_name: ct-town-advisor
    ports:
      - "8501:8501"
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - GCS_BUCKET_NAME=${GCS_BUCKET_NAME}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.0-flash-live-001}
    volumes:
      # Mount local /data so you can add PDFs without rebuilding the image
      - ../data:/app/data:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
